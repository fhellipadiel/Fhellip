<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Finanças</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white min-h-screen p-4 pb-24">

    <div class="max-w-md mx-auto w-full">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <button id="profileBtn" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/10 overflow-hidden relative">
                    <i data-lucide="user" id="userIcon"></i>
                    <img id="profileImg" class="hidden w-full h-full object-cover absolute inset-0">
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <span class="font-bold">Fhellip Adiel</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="calcBtn" class="font-bold text-sm bg-white/10 px-3 py-1 rounded-full">0%</button>
                <button id="openHistoryBtn" class="p-2 bg-white/10 rounded-full"><i data-lucide="list" size="18"></i></button>
                <button id="confirmBtn" class="text-white"><i data-lucide="check" size="22"></i></button>
            </div>
        </div>

        <!-- Saldo -->
        <div class="bg-gradient-to-br from-white to-gray-400 text-black p-6 rounded-[24px] mb-6">
            <p class="text-xs font-bold uppercase opacity-70">Saldo Total</p>
            <h2 id="totalDisplay" class="text-4xl font-bold mt-1">R$ 0,00</h2>
        </div>

        <!-- Calendário -->
        <div class="bg-white/5 p-4 rounded-2xl mb-6">
            <div class="flex justify-between mb-4">
                <button id="prevMonth"><i data-lucide="chevron-left"></i></button>
                <span id="monthDisplay" class="font-bold"></span>
                <button id="nextMonth"><i data-lucide="chevron-right"></i></button>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-2 text-center text-sm"></div>
        </div>

        <div id="transactionList" class="space-y-3"></div>
        <button id="addBtn" class="fixed bottom-8 right-8 bg-white text-black p-4 rounded-full shadow-2xl z-40"><i data-lucide="plus" size="28"></i></button>
    </div>

    <!-- Modais -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/80 hidden z-50 flex items-end justify-center p-4">
        <div id="formModal" class="bg-neutral-900 w-full max-w-sm p-6 rounded-[32px] hidden space-y-4">
            <div class="flex justify-between mb-4"><h2>Nova Anotação</h2><button onclick="closeModals()"><i data-lucide="x"></i></button></div>
            <input id="inputNome" placeholder="Nome" class="w-full bg-white/5 p-4 rounded-xl">
            <input id="inputDoc" placeholder="CPF/CNPJ" class="w-full bg-white/5 p-4 rounded-xl" maxlength="18">
            <input id="inputValor" placeholder="R$ 0,00" class="w-full bg-white/5 p-4 rounded-xl">
            <input id="inputData" type="date" class="w-full bg-white/5 p-4 rounded-xl">
            <button id="saveBtn" class="w-full bg-white text-black py-4 rounded-xl font-bold">SALVAR</button>
        </div>
        <div id="historyModal" class="bg-neutral-900 w-full max-w-sm max-h-[80vh] p-6 rounded-[32px] hidden overflow-y-auto">
            <div class="flex justify-between mb-6"><h2>Histórico</h2><button onclick="closeModals()"><i data-lucide="x"></i></button></div>
            <div id="historyList" class="space-y-2"></div>
        </div>
        <div id="percentModal" class="bg-neutral-900 w-full max-w-sm p-6 rounded-[32px] hidden space-y-4">
            <h2 class="text-center font-bold">Definir Porcentagem (%)</h2>
            <input id="inputPercent" type="number" class="w-full bg-white/5 p-4 rounded-xl text-center text-2xl font-bold">
            <button id="savePercent" class="w-full bg-white text-black py-4 rounded-xl font-bold">OK</button>
        </div>
    </div>

    <script>
        let trans = JSON.parse(localStorage.getItem('transactions')) || [];
        let history = JSON.parse(localStorage.getItem('history')) || [];
        let closingDates = JSON.parse(localStorage.getItem('closingDates')) || [];
        let percent = JSON.parse(localStorage.getItem('percentage')) || 2;
        let selectedDate = new Date().toISOString().split('T')[0];
        let curr = new Date();
        let valorRaw = '0';
        let viewMode = 'current';

        const savedImg = localStorage.getItem('profileImage');
        if (savedImg) {
            document.getElementById('profileImg').src = savedImg;
            document.getElementById('profileImg').classList.remove('hidden');
            document.getElementById('userIcon').classList.add('hidden');
        }

        function handleDateClick(dStr) {
            selectedDate = dStr;
            const closedEntry = history.find(h => h.dateKey === dStr);
            if (closedEntry) {
                viewMode = 'closed';
                document.getElementById('totalDisplay').innerText = closedEntry.finalValue.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            } else {
                viewMode = 'current';
            }
            render();
        }

        function render() {
            if (viewMode === 'current') {
                const total = trans.filter(t => t.data == selectedDate).reduce((a, b) => a + b.valor, 0);
                document.getElementById('totalDisplay').innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            }
            document.getElementById('calcBtn').innerText = ((viewMode === 'current' ? trans.filter(t => t.data == selectedDate).reduce((a,b)=>a+b.valor,0) : 0) * (percent/100)).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = ['D','S','T','Q','Q','S','S'].map(d => `<div class="text-gray-500 font-bold">${d}</div>`).join('');
            const daysInMonth = new Date(curr.getFullYear(), curr.getMonth()+1, 0).getDate();
            const firstDay = new Date(curr.getFullYear(), curr.getMonth(), 1).getDay();
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';

            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasEntry = trans.some(t => t.data === dStr);
                const isClosed = closingDates.includes(dStr);
                grid.innerHTML += `<button onclick="handleDateClick('${dStr}')" class="p-2 rounded-xl flex flex-col items-center 
                    ${isClosed ? 'bg-gray-800 text-white' : (selectedDate==dStr ? 'bg-white text-black' : 'bg-white/5')}">
                    ${i} ${hasEntry ? '<div class="w-1 h-1 bg-green-500 rounded-full mt-1"></div>' : ''}
                </button>`;
            }

            document.getElementById('transactionList').innerHTML = viewMode === 'current' ? trans
                .filter(t => t.data == selectedDate)
                .sort((a, b) => b.id - a.id)
                .map(t => `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center">
                    <div><p class="font-bold">${t.nome}</p><p class="text-xs text-gray-400">${t.doc}</p></div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold">${t.valor.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span>
                        <button onclick="deleteTrans(${t.id})" class="text-red-500"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>`).join('') : '<p class="text-center text-gray-500">Visualizando dia de fechamento.</p>';

            document.getElementById('monthDisplay').innerText = curr.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
            localStorage.setItem('transactions', JSON.stringify(trans));
            localStorage.setItem('closingDates', JSON.stringify(closingDates));
            localStorage.setItem('percentage', JSON.stringify(percent));
            lucide.createIcons();
        }

        document.getElementById('inputDoc').oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length <= 11) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            else v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
            e.target.value = v;
        };

        document.getElementById('profileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('profileImg').src = ev.target.result;
                    document.getElementById('profileImg').classList.remove('hidden');
                    document.getElementById('userIcon').classList.add('hidden');
                    localStorage.setItem('profileImage', ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        function deleteTrans(id) { trans = trans.filter(t => t.id !== id); render(); }

        function deleteHistory(index) { 
            const removed = history.splice(index, 1);
            const dateStr = removed[0].dateKey;
            closingDates = closingDates.filter(d => d !== dateStr);
            localStorage.setItem('history', JSON.stringify(history)); 
            viewMode = 'current';
            renderHistory(); 
            render(); 
        }

        function renderHistory() {
            document.getElementById('historyList').innerHTML = [...history].reverse().map((h, i) => `
                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center">
                    <div><p class="text-xs opacity-70">${h.range}</p><p class="font-bold">${h.finalValue.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</p></div>
                    <button onclick="deleteHistory(${history.length - 1 - i})" class="text-red-500"><i data-lucide="trash-2" size="18"></i></button>
                </div>`).join('');
            lucide.createIcons();
        }

        document.getElementById('addBtn').onclick = () => { viewMode='current'; document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('formModal').classList.remove('hidden'); document.getElementById('inputData').value = selectedDate; };
        document.getElementById('openHistoryBtn').onclick = () => { document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('historyModal').classList.remove('hidden'); renderHistory(); };
        document.getElementById('calcBtn').onclick = () => { document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('percentModal').classList.remove('hidden'); document.getElementById('inputPercent').value = percent; };
        document.getElementById('saveBtn').onclick = () => { trans.push({id:Date.now(), nome:document.getElementById('inputNome').value, doc:document.getElementById('inputDoc').value, valor:parseInt(valorRaw)/100, data:document.getElementById('inputData').value}); closeModals(); render(); };

        document.getElementById('confirmBtn').onclick = () => { 
            const dateKey = selectedDate;
            // Se a data selecionada não tiver transações próprias, busca todas as anteriores pendentes
            let dailyTotal = trans.filter(t => t.data === dateKey).reduce((a,b)=>a+b.valor,0);
            let targetTransactions = trans.filter(t => t.data === dateKey);

            if (dailyTotal === 0) {
                targetTransactions = trans.filter(t => t.data <= dateKey);
                dailyTotal = targetTransactions.reduce((a,b)=>a+b.valor,0);
            }

            history.push({dateKey, range: 'Fechamento '+dateKey, finalValue: dailyTotal}); 
            closingDates.push(dateKey);

            // Remove as transações que foram fechadas
            trans = trans.filter(t => !targetTransactions.includes(t));

            localStorage.setItem('history', JSON.stringify(history)); 
            viewMode = 'closed';
            render(); 
        };

        document.getElementById('savePercent').onclick = () => { percent = parseInt(document.getElementById('inputPercent').value); closeModals(); render(); };

        document.getElementById('inputValor').oninput = (e) => { valorRaw = e.target.value.replace(/\D/g, ''); e.target.value = (parseInt(valorRaw || 0) / 100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); };
        document.getElementById('prevMonth').onclick = () => { curr.setMonth(curr.getMonth()-1); render(); };
        document.getElementById('nextMonth').onclick = () => { curr.setMonth(curr.getMonth()+1); render(); };
        function closeModals() { document.getElementById('modalOverlay').classList.add('hidden'); document.getElementById('formModal').classList.add('hidden'); document.getElementById('historyModal').classList.add('hidden'); document.getElementById('percentModal').classList.add('hidden'); }

        render();
    </script>
</body>
</html>
