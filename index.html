<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Finanças</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white min-h-screen p-4 pb-24">

    <div class="max-w-md mx-auto w-full">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <button id="profileBtn" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/10 overflow-hidden relative">
                    <i data-lucide="user" id="userIcon"></i>
                    <img id="profileImg" class="hidden w-full h-full object-cover absolute inset-0">
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <span class="font-bold">Fhellip Adiel</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="calcBtn" class="font-bold text-sm bg-white/10 px-3 py-1 rounded-full">R$ 0,00</button>
                <button id="openHistoryBtn" class="p-2 bg-white/10 rounded-full"><i data-lucide="list" size="18"></i></button>
                <button id="confirmBtn" class="text-white"><i data-lucide="check" size="22"></i></button>
            </div>
        </div>

        <div class="bg-gradient-to-br from-white to-gray-400 text-black p-6 rounded-[24px] mb-6">
            <p class="text-xs font-bold uppercase opacity-70">Saldo Total</p>
            <h2 id="totalDisplay" class="text-4xl font-bold mt-1">R$ 0,00</h2>
        </div>

        <div class="bg-white/5 p-4 rounded-2xl mb-6">
            <div class="flex justify-between mb-4">
                <button id="prevMonth"><i data-lucide="chevron-left"></i></button>
                <span id="monthDisplay" class="font-bold"></span>
                <button id="nextMonth"><i data-lucide="chevron-right"></i></button>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-2 text-center text-sm"></div>
        </div>

        <div id="transactionList" class="space-y-3"></div>
        <button id="addBtn" class="fixed bottom-8 right-8 bg-white text-black p-4 rounded-full shadow-2xl z-40"><i data-lucide="plus" size="28"></i></button>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/80 hidden z-50 flex items-end justify-center p-4">
        <div id="formModal" class="bg-neutral-900 w-full max-w-sm p-6 rounded-[32px] hidden space-y-4">
            <div class="flex justify-between mb-4"><h2>Nova Anotação</h2><button onclick="closeModals()"><i data-lucide="x"></i></button></div>
            <input id="inputNome" placeholder="Nome" class="w-full bg-white/5 p-4 rounded-xl">
            <input id="inputDoc" placeholder="CPF/CNPJ" class="w-full bg-white/5 p-4 rounded-xl" maxlength="18">
            <input id="inputValor" placeholder="R$ 0,00" class="w-full bg-white/5 p-4 rounded-xl">
            <input id="inputData" type="date" class="w-full bg-white/5 p-4 rounded-xl">
            <button id="saveBtn" class="w-full bg-white text-black py-4 rounded-xl font-bold">SALVAR</button>
        </div>
        <div id="historyModal" class="bg-neutral-900 w-full max-w-sm max-h-[80vh] p-6 rounded-[32px] hidden overflow-y-auto">
            <div class="flex justify-between mb-6"><h2>Histórico</h2><button onclick="closeModals()"><i data-lucide="x"></i></button></div>
            <div id="historyList" class="space-y-2"></div>
        </div>
        <div id="percentModal" class="bg-neutral-900 w-full max-w-sm p-6 rounded-[32px] hidden space-y-4">
            <h2 class="text-center font-bold">Definir Porcentagem (%)</h2>
            <input id="inputPercent" type="number" class="w-full bg-white/5 p-4 rounded-xl text-center text-2xl font-bold">
            <button id="savePercent" class="w-full bg-white text-black py-4 rounded-xl font-bold">OK</button>
        </div>
    </div>

    <script>
        let trans = JSON.parse(localStorage.getItem('transactions')) || [];
        let history = JSON.parse(localStorage.getItem('history')) || [];
        let percent = JSON.parse(localStorage.getItem('percentage')) || 2;
        let selectedDate = new Date().toISOString().split('T')[0];
        let curr = new Date();
        let valorRaw = '0';

        const savedImg = localStorage.getItem('profileImage');
        if(savedImg) {
            const img = document.getElementById('profileImg');
            img.src = savedImg; img.classList.remove('hidden'); document.getElementById('userIcon').classList.add('hidden');
        }

        function render() {
            const isClosed = history.find(h => h.dateKey === selectedDate);
            const dailyTrans = isClosed ? [] : trans.filter(t => t.data === selectedDate);
            const totalBase = dailyTrans.reduce((a, b) => a + b.valor, 0);
            const displayTotal = isClosed ? isClosed.finalTotal : totalBase;
            const totalPercent = isClosed ? isClosed.finalPercent : (totalBase * (percent / 100));

            document.getElementById('totalDisplay').innerText = displayTotal.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('calcBtn').innerText = totalPercent.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = ['D','S','T','Q','Q','S','S'].map(d => `<div class="text-gray-500 font-bold">${d}</div>`).join('');
            const daysInMonth = new Date(curr.getFullYear(), curr.getMonth()+1, 0).getDate();
            const firstDay = new Date(curr.getFullYear(), curr.getMonth(), 1).getDay();
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasEntry = trans.some(t => t.data === dStr) || history.some(h => h.dateKey === dStr);
                grid.innerHTML += `<button onclick="handleDateClick('${dStr}')" class="p-2 rounded-xl flex flex-col items-center ${history.some(h=>h.dateKey==dStr) ? 'bg-green-800' : (selectedDate==dStr ? 'bg-white text-black' : 'bg-white/5')}">
                    ${i} ${hasEntry ? '<div class="w-1 h-1 bg-white rounded-full mt-1"></div>' : ''}
                </button>`;
            }

            document.getElementById('transactionList').innerHTML = isClosed 
                ? `<div class="bg-green-900/20 p-4 rounded-2xl border border-green-500/30 flex justify-between items-center"><p class="font-bold text-green-400">Dia Fechado</p><button onclick="deleteHistoryEntry('${selectedDate}')" class="text-red-500"><i data-lucide="trash-2" size="18"></i></button></div>`
                : dailyTrans.sort((a,b)=>b.id-a.id).map(t => `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center"><div><p class="font-bold">${t.nome}</p><p class="text-xs text-gray-400">${t.doc}</p></div><div class="flex items-center gap-4"><span class="font-bold">${t.valor.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span><button onclick="deleteTrans(${t.id})" class="text-red-500"><i data-lucide="trash-2" size="18"></i></button></div></div>`).join('');

            document.getElementById('monthDisplay').innerText = curr.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
            localStorage.setItem('transactions', JSON.stringify(trans));
            localStorage.setItem('history', JSON.stringify(history));
            localStorage.setItem('percentage', JSON.stringify(percent));
            lucide.createIcons();
        }

        function clearForm() {
            document.getElementById('inputNome').value = '';
            document.getElementById('inputDoc').value = '';
            document.getElementById('inputValor').value = '';
            valorRaw = '0';
        }

        document.getElementById('inputDoc').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 14) v = v.substring(0, 14);
            if (v.length <= 11) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            else v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
            e.target.value = v;
        });

        document.getElementById('profileBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { localStorage.setItem('profileImage', ev.target.result); location.reload(); };
            reader.readAsDataURL(e.target.files[0]);
        };

        function handleDateClick(dStr) { selectedDate = dStr; render(); }
        function deleteTrans(id) { trans = trans.filter(t => t.id !== id); render(); }
        function deleteHistoryEntry(dateKey) { history = history.filter(h => h.dateKey !== dateKey); render(); }
        function deleteHistoryByIndex(i) { history.splice(i, 1); render(); }
        
        function renderHistory() { 
            document.getElementById('historyList').innerHTML = history.map((h, i) => `
                <div class="bg-white/5 p-3 rounded-xl">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-xs opacity-70">${h.dateKey}</p>
                        <button onclick="deleteHistoryByIndex(${i}); renderHistory(); render();" class="text-red-500"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span>Total: <span class="font-bold">${h.finalTotal.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span></span>
                        <span>Comissão: <span class="font-bold text-green-400">${h.finalPercent.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span></span>
                    </div>
                </div>`).join(''); 
            lucide.createIcons(); 
        }
        
        document.getElementById('addBtn').onclick = () => { clearForm(); document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('formModal').classList.remove('hidden'); document.getElementById('inputData').value = selectedDate; };
        document.getElementById('openHistoryBtn').onclick = () => { document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('historyModal').classList.remove('hidden'); renderHistory(); };
        document.getElementById('calcBtn').onclick = () => { document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('percentModal').classList.remove('hidden'); document.getElementById('inputPercent').value = percent; };
        
        document.getElementById('confirmBtn').onclick = () => {
            const lastDate = history.length > 0 ? history[history.length-1].dateKey : '0000-00-00';
            const pendingTrans = trans.filter(t => t.data > lastDate && t.data <= selectedDate);
            const total = pendingTrans.reduce((a,b)=>a+b.valor,0);
            if (total > 0) { history.push({dateKey: selectedDate, finalTotal: total, finalPercent: (total * (percent/100))}); render(); }
        };

        document.getElementById('saveBtn').onclick = () => { trans.push({id:Date.now(), nome:document.getElementById('inputNome').value, doc:document.getElementById('inputDoc').value, valor:parseInt(valorRaw)/100, data:document.getElementById('inputData').value}); closeModals(); render(); };
        document.getElementById('savePercent').onclick = () => { percent = parseInt(document.getElementById('inputPercent').value); closeModals(); render(); };
        document.getElementById('inputValor').oninput = (e) => { valorRaw = e.target.value.replace(/\D/g, ''); e.target.value = (parseInt(valorRaw || 0) / 100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); };
        document.getElementById('prevMonth').onclick = () => { curr.setMonth(curr.getMonth()-1); render(); };
        document.getElementById('nextMonth').onclick = () => { curr.setMonth(curr.getMonth()+1); render(); };
        function closeModals() { document.getElementById('modalOverlay').classList.add('hidden'); document.querySelectorAll('#modalOverlay > div').forEach(d => d.classList.add('hidden')); }
        render();
    </script>
</body>
</html>
